name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        include:
          # One Windows job for cross-platform coverage (primary dev env).
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install
        run: uv pip install --system -e ".[dev]"

      - name: Test
        run: pytest -ra --cov=langgraph_stream_parser --cov-report=term-missing

  minimal-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install with NO extras (declared deps only)
        run: uv pip install --system .

      - name: Import smoke on a minimal install
        run: |
          python -c "import langgraph_stream_parser; from langgraph_stream_parser import StreamParser, load_agent_spec; from langgraph_stream_parser.tasks import TaskRunner, TASK_TOOLS; print('ok')"
